<!doctype html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вхід</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
    <main class="container">
        <div class="card">
            <h1>Вхід</h1>
            <p class="subtitle">Увійдіть, щоб переглядати дані.</p>

            <form class="form-grid" method="post" action="/login">
                <label>
                    Email
                    <input type="email" name="email" required />
                </label>

                <label>
                    Пароль
                    <input type="password" name="password" required />
                </label>

                {% if error %}
                <p class="subtitle">{{ error }}</p>
                {% endif %}

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Увійти</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
